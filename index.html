// Forward limit: 2400 up to 2360 kg; slopes rearward 0.27 mm/kg to 2560 @ 2950 kg
function fwdLimit(w) {
  if (w <= 2360) return 2400;
  if (w >= 2950) return 2560;

}

// post-load point exactly on a moving limit (fwd) or fixed limit (aft).

  // mode: "add" | "remove"; side: "fwd" | "aft"

      lo = hiTry - 5;

    w,
    W2,

   ADDITIONAL CFPA SECTION MODULES

const KG_USG = ECHO.KG_PER_USG; // 2.72
const stepC = (title, formula, work) => ({
  title,
  formula,
  work
});

// ---------- FUEL PLANNING ----------
function solveFuel({
  mode,
  fob,
  taxi,
  reserve,
  ff,
  trip
}) {
  fob = Number(fob);
  taxi = Number(taxi);
  reserve = Number(reserve);
  ff = Number(ff);
  trip = Number(trip);
  if (mode === "endurance") {
    if (!fob || !ff) return {
      steps: [],
      answer: null,
      error: "Enter fuel on board and fuel flow."
    };
    const usable = fob - (taxi || 0) - (reserve || 0);
    const hr = usable / ff;
    return {
      steps: [stepC("1. Strip the untouchables", "usable = FOB − taxi − reserve", `usable = ${fmt(fob)} − ${fmt(taxi || 0)} − ${fmt(reserve || 0)} = ${fmt(usable, 1)} USG`), stepC("2. Safe endurance", "SE = usable ÷ fuel flow", `SE = ${fmt(usable, 1)} ÷ ${fmt(ff)} = ${fmt(hr, 3)} hr = ${fmt(hr * 60, 0)} min`)],
      answer: `Safe endurance ≈ ${fmt(hr * 60, 0)} min (${fmt(hr, 2)} hr).`
    };
  }
  if (mode === "contingency") {
    if (!trip) return {
      steps: [],
      answer: null,
      error: "Enter trip fuel."
    };
    const c = 0.10 * trip;
    return {
      steps: [stepC("1. Rule (Part 135 piston)", "contingency = 10% of TRIP fuel", `always % of trip, not total.`), stepC("2. Compute", "0.10 × trip", `= 0.10 × ${fmt(trip)} = ${fmt(c, 1)}`)],
      answer: `Contingency = ${fmt(c, 1)} (same units as trip).`
    };
  }
  // reserve at a named flow (45 min piston)
  if (!ff) return {
    steps: [],
    answer: null,
    error: "Enter the fuel flow to use for the reserve."
  };
  const r = 0.75 * ff;
  return {
    steps: [stepC("1. Reserve fixed by time", "Part 135 piston final reserve = 45 min", `quantity comes from the named flow.`), stepC("2. Apply named flow", "reserve = 45/60 × FF", `= 0.75 × ${fmt(ff)} = ${fmt(r, 2)} USG`), stepC("3. Trap", "don't default to a pre-baked figure", `use the flow the question names.`)],
    answer: `Final reserve = ${fmt(r, 2)} USG.`
  };
}
function genFuel() {
  const mode = pick(["endurance", "contingency", "reserve"]);
  if (mode === "endurance") {
    const fob = rand(150, 178, 2),
      ff = rand(20, 28, 1);
    return {
      section: "fuel",
      type: "Safe endurance",
      prompt: `An Echo starts with ${fob} USG. Taxi 3 USG, final reserve 15 USG, cruise fuel flow ${ff} USG/hr. Find the safe endurance.`,
      preset: {
        mode: "endurance",
        fob,
        taxi: 3,
        reserve: 15,
        ff
      }
    };
  }
  if (mode === "contingency") {
    const trip = rand(120, 240, 5);
    return {
      section: "fuel",
      type: "Contingency (Part 135 piston)",
      prompt: `A Part 135 piston Echo flight has ${trip} L of trip fuel. Find the contingency fuel.`,
      preset: {
        mode: "contingency",
        trip
      }
    };
  }
  const ff = rand(21, 26, 1);
  return {
    section: "fuel",
    type: "Final reserve at a named flow",
    prompt: `A Part 135 piston Echo must carry 45 min final reserve, using cruise fuel flow ${ff} USG/hr. Find the reserve fuel.`,
    preset: {
      mode: "reserve",
      ff
    }
  };
}

// ---------- PNR (symmetric single-home) ----------
function solvePNR({
  fob,
  taxi,
  reserve,
  ff,
  tas,
  wind
}) {
  fob = Number(fob);
  taxi = Number(taxi);
  reserve = Number(reserve);
  ff = Number(ff);
  tas = Number(tas);
  wind = Number(wind);
  if (!fob || !ff || !tas) return {
    steps: [],
    answer: null,
    error: "Enter fuel on board, fuel flow and TAS."
  };
  const usable = fob - (taxi || 0) - (reserve || 0);
  const se = usable / ff;
  const gsO = tas - wind,
    gsH = tas + wind;
  const t = se * gsH / (gsO + gsH);
  const d = gsO * t;
  return {
    steps: [stepC("1. Safe endurance", "SE = (FOB − taxi − reserve) ÷ FF", `usable = ${fmt(fob)} − ${fmt(taxi || 0)} − ${fmt(reserve || 0)} = ${fmt(usable, 1)} USG\nSE = ${fmt(usable, 1)} ÷ ${fmt(ff)} = ${fmt(se, 3)} hr`), stepC("2. Groundspeeds", "GS(O) = TAS − wind ; GS(H) = TAS + wind", `GS(O) = ${fmt(tas)} − ${fmt(wind)} = ${fmt(gsO)} kt\nGS(H) = ${fmt(tas)} + ${fmt(wind)} = ${fmt(gsH)} kt`), stepC("3. Time to PNR", "t = SE × GS(H) ÷ (GS(O)+GS(H))", `t = ${fmt(se, 3)} × ${fmt(gsH)} ÷ ${fmt(gsO + gsH)} = ${fmt(t, 3)} hr = ${fmt(t * 60, 0)} min`), stepC("4. Distance to PNR", "d = GS(O) × t", `d = ${fmt(gsO)} × ${fmt(t, 3)} = ${fmt(d, 0)} nm`)],
    answer: `PNR: ${fmt(t * 60, 0)} min out, ${fmt(d, 0)} nm from departure.`
  };
}
function genPNR() {
  const tas = rand(160, 190, 5),
    wind = rand(20, 40, 5),
    fob = rand(150, 175, 5),
    ff = rand(20, 26, 1);
  return {
    section: "pnr",
    type: "Standard PNR",
    prompt: `An Echo departs with ${fob} USG (taxi 3, reserve 15). Cruise FF ${ff} USG/hr, TAS ${tas} kt, ${wind} kt headwind outbound (tailwind home). Find time and distance to the PNR.`,
    preset: {
      fob,
      taxi: 3,
      reserve: 15,
      ff,
      tas,
      wind
    }
  };
}

// ---------- ETP / CP (normal ops) ----------
function solveETP({
  D,
  tas,
  wind
}) {
  D = Number(D);
  tas = Number(tas);
  wind = Number(wind);
  if (!D || !tas) return {
    steps: [],
    answer: null,
    error: "Enter distance and TAS."
  };
  const gsO = tas - wind,
    gsH = tas + wind;
  const x = D * gsH / (gsO + gsH);
  const t = x / gsO * 60;
  return {
    steps: [stepC("1. Groundspeeds", "GS(O) = TAS − wind ; GS(H) = TAS + wind", `GS(O) = ${fmt(gsO)} kt, GS(H) = ${fmt(gsH)} kt`), stepC("2. Distance to ETP", "X = D × GS(H) ÷ (GS(O)+GS(H))", `X = ${fmt(D)} × ${fmt(gsH)} ÷ ${fmt(gsO + gsH)} = ${fmt(x, 1)} nm`), stepC("3. Time to ETP", "t = X ÷ GS(O) × 60", `t = ${fmt(x, 1)} ÷ ${fmt(gsO)} × 60 = ${fmt(t, 0)} min`)],
    answer: `ETP: ${fmt(x, 0)} nm / ${fmt(t, 0)} min from departure.`
  };
}
function genETP() {
  const D = rand(300, 600, 10),
    tas = rand(160, 190, 5),
    wind = rand(20, 40, 5);
  return {
    section: "etp",
    type: "ETP (normal ops)",
    prompt: `Two aerodromes are ${D} nm apart. An Echo cruises TAS ${tas} kt with a ${wind} kt headwind outbound (tailwind return). Find distance and time to the ETP from departure.`,
    preset: {
      D,
      tas,
      wind
    }
  };
}

// ---------- CLIMB & CRUISE ----------
function solveClimb({
  mode,
  height,
  rocB,
  rocT,
  tasB,
  tasT,
  ffTot,
  grad,
  tas,
  wind
}) {
  if (mode === "gradient") {
    grad = Number(grad);
    tas = Number(tas);
    wind = Number(wind);
    if (!grad || !tas) return {
      steps: [],
      answer: null,
      error: "Enter gradient and TAS."
    };
    const gs = tas - (wind || 0);
    const roc = grad / 100 * gs * 101.3;
    return {
      steps: [stepC("1. Groundspeed", "GS = TAS − headwind", `GS = ${fmt(tas)} − ${fmt(wind || 0)} = ${fmt(gs)} kt`), stepC("2. ROC required", "ROC = gradient% × GS (1 kt ≈ 101.3 ft/min)", `= ${fmt(grad)}% × ${fmt(gs)} = ${fmt(roc, 0)} ft/min`), stepC("3. Note", "headwind lowers GS → lowers the ROC needed", `counter-intuitive but correct.`)],
      answer: `Required ROC ≈ ${fmt(roc, 0)} ft/min.`
    };
  }
  // time/distance/fuel
  height = Number(height);
  rocB = Number(rocB);
  rocT = Number(rocT);
  tasB = Number(tasB);
  tasT = Number(tasT);
  ffTot = Number(ffTot);
  if (!height || !rocB || !tasB) return {
    steps: [],
    answer: null,
    error: "Enter height, ROC and TAS."
  };
  const roc = (rocB + (rocT || rocB)) / 2,
    tasAvg = (tasB + (tasT || tasB)) / 2;
  const t = height / roc;
  return {
    steps: [stepC("1. Average the rates", "avg ROC & avg TAS = (bottom+top)/2", `avg ROC = ${fmt(roc, 0)} ft/min\navg TAS = ${fmt(tasAvg, 1)} kt`), stepC("2. Time", "t = height ÷ avg ROC", `t = ${fmt(height)} ÷ ${fmt(roc, 0)} = ${fmt(t, 2)} min`), stepC("3. Distance", "d = avg TAS ÷ 60 × t", `d = ${fmt(tasAvg, 1)} ÷ 60 × ${fmt(t, 2)} = ${fmt(tasAvg / 60 * t, 1)} nm`), ...(ffTot ? [stepC("4. Fuel", "fuel = FF ÷ 60 × t", `= ${fmt(ffTot)} ÷ 60 × ${fmt(t, 2)} = ${fmt(ffTot / 60 * t, 1)} USG`)] : [])],
    answer: `Climb: ${fmt(t, 1)} min, ${fmt(tasAvg / 60 * t, 1)} nm${ffTot ? ", " + fmt(ffTot / 60 * t, 1) + " USG" : ""}.`
  };
}
function genClimb() {
  const mode = pick(["tdf", "gradient"]);
  if (mode === "gradient") {
    const grad = rand(3, 6, 1),
      tas = rand(90, 110, 1),
      wind = rand(0, 25, 5);
    return {
      section: "climb",
      type: "Climb gradient → ROC",
      prompt: `An Echo must hold a ${grad}% climb gradient. TAS ${tas} kt, ${wind} kt headwind. What ROC (ft/min) is required?`,
      preset: {
        mode: "gradient",
        grad,
        tas,
        wind
      }
    };
  }

  const tasB = rand(100, 110, 1),

  return {
    section: "climb",
    type: "Climb time / distance / fuel",
    prompt: `An Echo climbs to ${height} ft. ROC ${rocB} ft/min bottom, ${rocT} top; TAS ${tasB} kt bottom, ${tasT} top. Climb FF 63.4 USG/hr. Find time, distance and fuel (nil wind).`,
    preset: {
      mode: "tdf",
      height,
      rocB,

// ---------- MAX WEIGHT / PAYLOAD / FUEL ----------
function solveMaxWt({
  mode,
  ff,
  other,
  tow,
  usg,
  ew,
  pax,
  cargo
}) {
  ff = Number(ff);
  other = Number(other);
  tow = Number(tow);
  usg = Number(usg);
  ew = Number(ew);
  pax = Number(pax);
  cargo = Number(cargo);
  if (mode === "maxTOW") {
    if (!ff || !other) return {
      steps: [],
      answer: null,
      error: "Enter flight fuel and other fuel."
    };
    const lw = ECHO.MTOW - ff,
      zfw = lw - other;
    const lwOver = lw - ECHO.MLW,
      zfwOver = zfw - ECHO.MZFW;
    let bind, newTOW;
    if (lwOver >= zfwOver) {
      bind = "LW";
      newTOW = ECHO.MLW + ff;
    } else {
      bind = "ZFW";
      newTOW = ECHO.MZFW + other + ff;
    }
    return {
      steps: [stepC("1. Test MTOW 2950", "LW = MTOW − FF ; ZFW = LW − other", `LW = 2950 − ${fmt(ff)} = ${fmt(lw, 0)}\nZFW = ${fmt(lw, 0)} − ${fmt(other)} = ${fmt(zfw, 0)}`), stepC("2. Compare ceilings", "exceedance = value − limit", `LW vs 2725 → over ${fmt(lwOver, 0)}\nZFW vs 2630 → over ${fmt(zfwOver, 0)}`), stepC("3. Greatest exceedance binds", "", `${bind} binds.`), stepC("4. Back fuel up to it", bind === "LW" ? "MTOW = MLW + FF" : "MTOW = MZFW + other + FF", bind === "LW" ? `= 2725 + ${fmt(ff)} = ${fmt(newTOW, 0)}` : `= 2630 + ${fmt(other)} + ${fmt(ff)} = ${fmt(newTOW, 0)}`)],
      answer: `${bind} binds → max take-off weight = ${fmt(newTOW, 0)} kg.`
    };
  }
  // max cargo
  if (!tow || !ew) return {
    steps: [],
    answer: null,
    error: "Enter take-off weight and empty weight."
  };
  const fobKg = (usg || 0) * KG_USG;
  const zfw = tow - fobKg;
  const payload = zfw - ew - 77;
  const c = payload - (pax || 0) * 77;
  return {
    steps: [stepC("1. FOB → kg, ZFW", "ZFW = TOW − FOB", `FOB = ${fmt(usg || 0)}×2.72 = ${fmt(fobKg, 1)} kg\nZFW = ${fmt(tow)} − ${fmt(fobKg, 1)} = ${fmt(zfw, 1)} kg`), stepC("2. Payload", "payload = ZFW − empty − pilot", `= ${fmt(zfw, 1)} − ${fmt(ew)} − 77 = ${fmt(payload, 1)} kg`), stepC("3. Cargo", "cargo = payload − pax", `= ${fmt(payload, 1)} − ${fmt(pax || 0)}×77 = ${fmt(c, 1)} kg`)],
    answer: `Max cargo = ${fmt(c, 0)} kg.`
  };
}
function genMaxWt() {
  const mode = pick(["maxTOW", "maxCargo"]);
  if (mode === "maxTOW") {
    const ff = rand(90, 160, 2),
      other = rand(150, 180, 2);
    return {
      section: "maxwt",
      type: "Max take-off weight",
      prompt: `An Echo burns ${ff} kg flight fuel, carrying ${other} kg reserve+contingency (other fuel). MTOW 2950, MLW 2725, MZFW 2630. Find the max take-off weight.`,
      preset: {
        mode: "maxTOW",
        ff,
        other
      }
    };
  }
  const tow = rand(2820, 2900, 10),
    usg = rand(90, 130, 5),
    ew = rand(1950, 2010, 5),
    pax = rand(2, 4);
  return {
    section: "maxwt",
    type: "Max cargo",
    prompt: `An Echo has take-off weight ${tow} kg, ${usg} USG fuel, empty weight ${ew} kg, pilot + ${pax} pax (77 kg each). Find the max cargo.`,
    preset: {
      mode: "maxCargo",
      tow,
      usg,
      ew,
      pax
    }
  };
}

.eh-tail{margin-left:auto;font-family:var(--mono);font-size:11px;letter-spacing:.18em;

.eh-navitem:hover{border-color:var(--amber)}

.eh-navlabel{font-size:13.5px;font-weight:600;color:var(--ink)}
.eh-navdesc{font-family:var(--mono);font-size:10px;color:var(--dim)}
.eh-navitem.on .eh-navlabel{color:var(--amber2)}
.eh-main{min-width:0}
.eh-sectionhead{margin-bottom:12px}
.eh-sectionhead h2{margin:0;font-size:18px;font-weight:650;letter-spacing:-.01em}

  .eh-shell{grid-template-columns:1fr}

}

.eh-tabs button:hover{color:var(--ink)}
.eh-tabs button.on{color:var(--amber);border-bottom-color:var(--amber)}
.eh-panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}

.eh-inputs label{display:flex;flex-direction:column;gap:6px}
.eh-inputs label.wide{grid-column:1 / -1}
.eh-inputs span{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);font-family:var(--mono)}
.eh-inputs input,.eh-inputs select{background:var(--bg);border:1px solid var(--line);color:var(--ink);

.gt:hover{border-color:var(--amber);color:var(--ink)}
.gt.on{background:var(--amber);border-color:var(--amber);color:#fff;font-weight:700}
.eh-version{margin-top:22px;text-align:center;font-family:var(--mono);font-size:10.5px;color:var(--dim);opacity:.7;letter-spacing:.04em}

.eh-loadsheet,.eh-alphaenv{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px}
.eh-lshead{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--amber2);margin-bottom:8px}
.eh-lstable{width:100%;border-collapse:collapse;font-size:13px}

.eh-lstable td.num{text-align:right;font-family:var(--mono)}
.eh-lstable tr.sub td{font-weight:700;color:var(--amber2);border-bottom:1px solid var(--line)}
.eh-alphanote{margin:8px 0 0;font-size:11px;line-height:1.5;color:var(--dim);font-family:var(--mono)}
.eh-alphanote strong{color:var(--amber2)}
@media (max-width:560px){.eh-alphawrap{grid-template-columns:1fr}}
.eh-svg{width:100%;height:auto;display:block}
.eh-axis{font-family:var(--mono);font-size:9px;fill:var(--dim)}
.eh-pt{font-family:var(--mono);font-size:10px;fill:var(--ink);font-weight:600}
.eh-steps{display:flex;flex-direction:column;gap:10px}

.eh-step-title{font-weight:600;font-size:14px;margin-bottom:6px}
.eh-formula{font-family:var(--mono);font-size:12px;color:var(--amber2);background:rgba(218,83,44,.07);padding:6px 8px;border-radius:5px;margin-bottom:8px}
.eh-work{font-family:var(--mono);font-size:13px;color:var(--ink);margin:0;white-space:pre-wrap;line-height:1.7}
.eh-verdict{margin-top:16px;background:linear-gradient(180deg,rgba(218,83,44,.14),rgba(218,83,44,.05));border:1px solid rgba(218,83,44,.45);border-radius:9px;padding:14px 16px;font-size:15px;font-weight:600;display:flex;align-items:center;gap:12px}
.eh-verdict-tag{font-family:var(--mono);font-size:10px;letter-spacing:.14em;background:var(--amber);color:#fff;padding:4px 8px;border-radius:4px;font-weight:700;display:inline-block}
.eh-note{background:rgba(229,103,95,.1);border:1px solid rgba(229,103,95,.3);color:#ffb4ae;padding:10px 12px;border-radius:8px;font-family:var(--mono);font-size:13px;margin-bottom:14px}
.eh-empty{text-align:center;padding:20px 10px}
.eh-empty p{color:var(--dim);margin:0 0 16px}
.eh-primary{background:var(--amber);color:#fff;border:none;font-weight:650;font-family:var(--sans);font-size:14px;padding:11px 18px;border-radius:8px;cursor:pointer;transition:.15s}
.eh-primary:hover{background:var(--amber2)}
.eh-ghost{background:none;color:var(--ink);border:1px solid var(--line);font-family:var(--sans);font-size:14px;padding:11px 16px;border-radius:8px;cursor:pointer;transition:.15s}
.eh-ghost:hover{border-color:var(--amber);color:var(--amber)}
.eh-question{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:16px;margin-bottom:16px}
.eh-qhead{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.eh-qtag{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:#fff;background:var(--amber);padding:3px 8px;border-radius:4px;font-weight:700;display:inline-block}
.eh-qtype{font-family:var(--mono);font-size:11px;color:var(--amber2)}
.eh-question p{margin:0;font-size:15px;line-height:1.55}
.eh-actions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.eh-varbar{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--line)}
.eh-varlabel{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-right:2px}
.chip{background:var(--bg);border:1px solid var(--line);color:var(--dim);font-family:var(--mono);font-size:11.5px;padding:7px 11px;border-radius:20px;cursor:pointer;transition:.15s}

.eh-refgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.eh-card{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:14px}
.eh-row{display:flex;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px dashed rgba(139,166,200,.18);font-size:13px}
.eh-row:last-child{border-bottom:none}
.eh-k{color:var(--dim)}
.eh-v{font-family:var(--mono);color:var(--ink);text-align:right}

.eh-slopenote strong{color:var(--amber2)}
.eh-disclaimer{margin-top:16px;color:var(--dim);font-size:11.5px;line-height:1.5;font-family:var(--mono)}
@media (max-width:560px){.eh-inputs{grid-template-columns:1fr}.eh-refgrid{grid-template-columns:1fr}.eh-head h1{font-size:19px}}
